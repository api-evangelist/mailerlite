specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: MailerLite
providerId: mailerlite
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Email Marketing
- Rate Limiting
- Quotas
- Throttling
description: MailerLite documents a 120-requests-per-minute API rate limit.
notes: >-
  All requests count against the same per-account 120/minute budget. Validation errors
  return HTTP 422; throttled requests return HTTP 429.
sources:
- https://developers.mailerlite.com/docs/
responseCodes:
  throttled: 429
  validation: 422
limits:
- name: API Requests
  scope: account
  metric: requests
  limit: 120
  window: 1 minute
  notes: Documented rate limit on connect.mailerlite.com.
policies:
- name: Backoff Strategy
  description: Honor Retry-After header and apply exponential backoff with jitter.
- name: Versioning
  description: Pin the API version with the X-Version header for predictable behavior.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
