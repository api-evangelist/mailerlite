specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: MailerLite
providerId: mailerlite
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Email Marketing
- FinOps
- Cost Management
- FOCUS
description: FOCUS-aligned FinOps profile for MailerLite's subscriber-tier subscription pricing.
notes: >-
  MailerLite charges a monthly subscription that scales with subscriber count. API access
  is included with all paid and free plans.
sources:
- https://www.mailerlite.com/pricing
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: MailerLite
serviceCategory: Email Marketing
billingModel:
  pricingCategory: Subscription (tiered by subscriber count)
  billingFrequency: Monthly or Annual
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: MailerLite Email Marketing
  ServiceCategory: Email Marketing
  ProviderName: MailerLite
  PublisherName: MailerLite
  InvoiceIssuerName: MailerLite
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: subscriber_count
  description: Active subscribers; drives plan-tier breakpoints.
  unit: subscribers
  aggregation: max
  dimensions:
  - account
- name: monthly_emails
  description: Monthly email send volume (capped on Free at 12k).
  unit: emails
  aggregation: sum
  dimensions:
  - account
- name: plan_subscription
  description: Monthly/annual plan fee.
  unit: months
  aggregation: sum
  dimensions:
  - plan_tier
principles:
- name: Visibility
  description: Track subscriber count vs. plan tier and email volume vs. cap.
- name: Allocation
  description: Allocate plan cost to the marketing/newsletter cost center.
- name: Optimization
  description: Prune unengaged subscribers; consider annual billing for discounts.
- name: Accountability
  description: Quarterly review of plan tier vs. actual subscriber count.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
